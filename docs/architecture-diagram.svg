<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Agent Reflexion Memory architecture</title>
<desc>Request flow from agent failure through the reflexion engine into ChromaDB and Neo4j, showing where each of the three novel mechanisms activates: hierarchical concept inheritance retrieval, cross-agent confidence reinforcement, and temporal decay on behavioral rules.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="720" fill="#ffffff"/>

<g>
<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Agent task fails</text>
</g>
<line x1="340" y1="64" x2="340" y2="100" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="100" width="560" height="160" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="80" y="124" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Reflexion engine</text>
<text x="80" y="140" font-family="sans-serif" font-size="12" fill="#3C3489">2 LLM calls via Groq</text>

<g>
<rect x="90" y="155" width="240" height="56" rx="12" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="210" y="175" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Distill failure</text>
<text x="210" y="195" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">→ imperative rule</text>
</g>

<line x1="330" y1="183" x2="358" y2="183" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="360" y="155" width="240" height="56" rx="12" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="480" y="175" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Categorize concept</text>
<text x="480" y="195" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">+ optional parent [NOVEL-1]</text>
</g>

<line x1="340" y1="260" x2="340" y2="296" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="296" width="560" height="120" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="80" y="320" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Dual-write storage</text>

<g>
<rect x="90" y="335" width="240" height="56" rx="12" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="210" y="355" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">ChromaDB</text>
<text x="210" y="375" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Rule text, embeddings, confidence</text>
</g>

<g>
<rect x="360" y="335" width="240" height="56" rx="12" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="355" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Neo4j</text>
<text x="480" y="375" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Concept graph, parent edges</text>
</g>

<line x1="330" y1="357" x2="358" y2="357" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="358" y1="369" x2="330" y2="369" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M600 363 L650 363 L650 600 L601 600" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<text x="654" y="480" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489" transform="rotate(90 654 480)">[NOVEL-2] cross-agent reinforce</text>

<line x1="340" y1="416" x2="340" y2="452" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="452" width="540" height="170" rx="20" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="80" y="476" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Future task retrieval</text>
<text x="80" y="492" font-family="sans-serif" font-size="12" fill="#712B13">[NOVEL-1] hierarchical concept inheritance</text>

<g>
<rect x="90" y="505" width="240" height="56" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="210" y="525" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Vector search</text>
<text x="210" y="545" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Find primary concept</text>
</g>

<line x1="330" y1="533" x2="358" y2="533" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="360" y="505" width="240" height="56" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="480" y="525" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Graph traversal</text>
<text x="480" y="545" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Direct + ancestor rules</text>
</g>

<line x1="340" y1="622" x2="340" y2="658" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="220" y="658" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="680" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Rules in system prompt</text>
</g>

<text x="60" y="700" font-family="sans-serif" font-size="12" fill="#5F5E5A">[NOVEL-3] temporal decay runs separately, scanning every rule's last_applied_at</text>

</svg>